<!DOCTYPE html>

<html lang="zh-CN">


<head>


<meta charset="UTF-8">


<title>
善化寺数字沉浸展厅
</title>


<link rel="stylesheet"

href="https://cdn.jsdelivr.net/npm/pannellum/build/pannellum.css">


<script src="https://cdn.jsdelivr.net/npm/pannellum/build/pannellum.js">

</script>



<style>


html,body{

margin:0;

height:100%;

overflow:hidden;

font-family:
"Microsoft YaHei";

}



/*全景窗口*/

#panorama{

width:100%;

height:100vh;

}




/*信息弹窗*/

.info-box{


position:absolute;

top:50%;

left:50%;

transform:
translate(-50%,-50%);


width:360px;


padding:30px;


background:

rgba(20,20,20,0.45);


backdrop-filter:
blur(15px);


-webkit-backdrop-filter:
blur(15px);


border:

1px solid rgba(255,255,255,0.35);



border-radius:18px;


color:white;


display:none;


z-index:10;


animation:
fade .5s;


box-shadow:

0 20px 50px rgba(0,0,0,.5);



}



.info-box h2{


text-align:center;


color:#e8c27a;


letter-spacing:5px;


}



.info-box p{


line-height:2;


font-size:15px;


}



.close{


position:absolute;


right:20px;


top:15px;


cursor:pointer;


font-size:22px;


}



@keyframes fade{


from{

opacity:0;

transform:
translate(-50%,-40%);

}


to{

opacity:1;

transform:
translate(-50%,-50%);

}


}




/*顶部标题*/


.title{


position:absolute;


top:30px;

left:50%;

transform:
translateX(-50%);


z-index:5;


color:white;


font-size:24px;


letter-spacing:8px;


text-shadow:
0 2px 8px black;


}



</style>


</head>



<body>


<div class="title">

善化寺 · 大雄宝殿

</div>



<div id="panorama"></div>



<div class="info-box" id="info">


<div class="close"
onclick="closeInfo()">
×
</div>


<h2>
释迦牟尼佛
</h2>


<p>

善化寺大雄宝殿中央供奉释迦牟尼佛。


<br><br>


该殿始建于辽代，重建于金代，
保存有完整的辽金建筑风貌。


<br><br>


佛像造型庄严，
衣纹细腻流畅，
体现中国北方佛教艺术
的独特审美。

</p>


</div>




<script>


let viewer;



viewer =
pannellum.viewer(
'panorama',
{


default:{


firstScene:"outside",


autoLoad:true,


sceneFadeDuration:1000


},




scenes:{



/**************
殿前
**************/

outside:{


type:"equirectangular",


panorama:

"images/exterior.jpg",


title:
"大雄宝殿前广场",



hotSpots:[


{


pitch:-5,

yaw:0,


type:"scene",


text:
"进入大雄宝殿",


sceneId:"inside"


}


]


},




/**************
殿内
**************/

inside:{


type:"equirectangular",


panorama:

"images/hall.jpg",



title:

"大雄宝殿内部",




hotSpots:[



{


pitch:0,

yaw:0,


type:"info",


text:

"查看释迦牟尼佛",



clickHandlerFunc:

function(){

openInfo();

}


},




{


pitch:-10,

yaw:-70,


type:"info",


text:

"左侧二十四诸天",


clickHandlerFunc:

function(){

openInfo2();

}


}



]


}



}



}

);



function openInfo(){


document
.getElementById("info")
.style.display="block";


}



function closeInfo(){


document
.getElementById("info")
.style.display="none";


}



function openInfo2(){


document
.getElementById("info")
.style.display="block";


document.querySelector(".info-box h2")
.innerHTML=
"二十四诸天";


document.querySelector(".info-box p")
.innerHTML=

"大雄宝殿两侧供奉二十四诸天护法像。<br><br>这些造像融合了中国传统武将形象与佛教护法体系，是辽金时期彩塑艺术的重要代表。";

}



</script>



</body>


</html>
