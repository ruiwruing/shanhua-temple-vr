<!DOCTYPE html>

<html lang="zh-CN">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>
善化寺 · 大雄宝殿数字体验
</title>



<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/pannellum/build/pannellum.css">


<script src="https://cdn.jsdelivr.net/npm/pannellum/build/pannellum.js">
</script>


<style>


*{

margin:0;

padding:0;

box-sizing:border-box;

}


html,body{

width:100%;

height:100%;

overflow:hidden;

font-family:
"Microsoft YaHei",
sans-serif;

}


/*全景*/

#panorama{

width:100%;

height:100vh;

}




/**************
顶部标题
**************/


.title{


position:absolute;

top:35px;

left:50%;

transform:translateX(-50%);


z-index:5;


color:white;


font-size:28px;


letter-spacing:12px;


text-shadow:

0 2px 15px #000;


}


/**************
VR按钮
**************/


#vrBtn{


position:absolute;


right:30px;


bottom:35px;


z-index:10;


padding:15px 28px;



border-radius:40px;


border:

1px solid rgba(255,255,255,.5);



background:

rgba(0,0,0,.45);



backdrop-filter:

blur(15px);



color:white;


font-size:16px;


cursor:pointer;


transition:.3s;


}


#vrBtn:hover{


background:

rgba(180,130,50,.8);


}




/**************
信息卡片
**************/


.info-box{


position:absolute;


top:50%;


left:50%;


transform:

translate(-50%,-50%);



width:420px;


padding:35px;



background:

rgba(15,15,15,.55);



backdrop-filter:

blur(18px);


-webkit-backdrop-filter:

blur(18px);



border:

1px solid rgba(255,255,255,.35);



border-radius:20px;



color:white;



display:none;



z-index:20;



box-shadow:

0 20px 60px rgba(0,0,0,.6);



animation:

show .5s;



}




.info-box h2{


text-align:center;


font-size:25px;


letter-spacing:8px;


color:#e6c27a;


margin-bottom:20px;



}



.info-box p{


font-size:16px;


line-height:2;


color:#eee;


}




.close{


position:absolute;


right:20px;


top:15px;


font-size:25px;


cursor:pointer;


}



@keyframes show{


from{

opacity:0;

transform:
translate(-50%,-40%);

}



to{

opacity:1;

transform:
translate(-50%,-50%);

}


}



</style>



</head>



<body>



<div class="title">

善化寺 · 大雄宝殿

</div>



<div id="panorama"></div>



<button id="vrBtn">

🥽 VR沉浸模式

</button>




<!-- 信息弹窗 -->


<div class="info-box" id="infoBox">


<div class="close"
onclick="closeInfo()">

×

</div>



<h2 id="infoTitle">

</h2>



<p id="infoContent">

</p>


</div>





<script>



/********************
 全景场景配置
********************/


let viewer;



viewer =
pannellum.viewer(

"panorama",


{


default:{


firstScene:"outside",


autoLoad:true,


sceneFadeDuration:1500



},



scenes:{



/*************
场景1
殿前
*************/


outside:{


type:"equirectangular",



panorama:

"images/exterior.jpg",



title:

"善化寺大雄宝殿前广场",



hfov:90,



hotSpots:[


{


pitch:-5,


yaw:0,


type:"scene",



text:

"进入大雄宝殿",



sceneId:

"inside"


}


]


},





/*************
场景2
殿内
*************/



inside:{



type:"equirectangular",



panorama:

"images/hall.jpg",



title:

"大雄宝殿内部",



hfov:90,



hotSpots:[



{


pitch:0,


yaw:0,


type:"info",


text:

"释迦牟尼佛",


clickHandlerFunc:

function(){

showInfo("buddha");

}


},




{


pitch:-5,


yaw:-55,


type:"info",


text:

"左侧二十四诸天",


clickHandlerFunc:

function(){

showInfo("guardians");

}


},




{


pitch:-5,


yaw:55,


type:"info",


text:

"右侧二十四诸天",


clickHandlerFunc:

function(){

showInfo("guardians");

}


}



]

}


}



}

);







/********************
 文物信息数据库
********************/



const data={



buddha:{


title:

"释迦牟尼佛",



content:

`

善化寺大雄宝殿中央主尊佛像。



<br><br>



年代：

金代。



<br><br>



艺术特点：

佛像神态庄严，
比例匀称，
衣纹流畅。


体现了辽金时期
北方佛教造像艺术。

`

},




guardians:{



title:

"二十四诸天",



content:

`

大雄宝殿两侧供奉二十四诸天护法像。


<br><br>


这些造像融合佛教体系
与中国传统武将形象。


<br><br>


具有鲜明的辽金彩塑艺术特色。

`

}



};





function showInfo(type){


let item=data[type];


document
.getElementById("infoTitle")
.innerHTML=
item.title;



document
.getElementById("infoContent")
.innerHTML=
item.content;



document
.getElementById("infoBox")
.style.display=
"block";


}




function closeInfo(){


document
.getElementById("infoBox")
.style.display=
"none";


}






/********************
 手机陀螺仪
********************/


if(
window.DeviceOrientationEvent
){


window.addEventListener(

"deviceorientation",


function(e){


if(e.alpha){


viewer.setYaw(
e.alpha
);


}


}


);


}





/********************
 VR按钮
********************/


document
.getElementById("vrBtn")
.onclick=

function(){



if(
navigator.xr
){


navigator.xr.requestSession(
"immersive-vr"

)
.then(

function(session){


alert(
"VR模式已启动"

);


}


);



}

else{


alert(

"当前设备不支持WebXR，请使用VR设备或手机浏览器"

);


}



}



</script>



</body>


</html>
