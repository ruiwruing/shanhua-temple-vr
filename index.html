<!DOCTYPE html>
<html lang="zh-CN">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>
善化寺 · 大雄宝殿数字沉浸体验
</title>


<!-- Pannellum -->

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/pannellum/build/pannellum.css">


<script src="https://cdn.jsdelivr.net/npm/pannellum/build/pannellum.js">
</script>



<style>


*{

margin:0;
padding:0;

box-sizing:border-box;

}



html,body{

width:100%;

height:100%;

overflow:hidden;

font-family:

"Microsoft YaHei",
"PingFang SC",
sans-serif;

}



/*******************
全景窗口
*******************/


#panorama{

width:100%;

height:100vh;

}





/*******************
顶部标题
*******************/


.title{


position:absolute;


top:35px;


left:50%;


transform:
translateX(-50%);



z-index:20;



color:white;



font-size:28px;



letter-spacing:12px;



text-shadow:

0 3px 15px #000;



}





/*******************
信息毛玻璃卡片
*******************/


.info-box{


position:absolute;


left:50%;


top:50%;



transform:

translate(-50%,-50%);



width:420px;



padding:35px;



background:

rgba(20,20,20,.55);



backdrop-filter:

blur(20px);



-webkit-backdrop-filter:

blur(20px);



border:

1px solid rgba(255,255,255,.35);



border-radius:22px;



color:white;



z-index:30;



display:none;



box-shadow:

0 20px 60px rgba(0,0,0,.6);



animation:

fade .4s;



}





.info-box h2{


text-align:center;


font-size:26px;


letter-spacing:8px;


color:#e7c47a;


margin-bottom:25px;



}



.info-box p{


font-size:16px;


line-height:2;


color:#eee;



}



.close{


position:absolute;


right:20px;


top:15px;



font-size:25px;



cursor:pointer;



}




@keyframes fade{


from{


opacity:0;


transform:
translate(-50%,-40%);



}


to{


opacity:1;


transform:
translate(-50%,-50%);



}


}





/*******************
数字导游控制栏
*******************/


.guide-bar{


position:absolute;



bottom:30px;



left:50%;



transform:

translateX(-50%);



z-index:25;



display:flex;



gap:35px;



padding:

15px 45px;



background:

rgba(20,20,20,.45);



backdrop-filter:

blur(18px);



-webkit-backdrop-filter:

blur(18px);



border:


1px solid rgba(255,255,255,.3);



border-radius:60px;



box-shadow:


0 10px 40px rgba(0,0,0,.5);



}




.guide-item{


width:75px;



height:65px;



display:flex;



flex-direction:column;



align-items:center;



justify-content:center;



cursor:pointer;



color:white;



font-size:26px;



transition:.3s;



}



.guide-item span{


font-size:14px;



margin-top:5px;



letter-spacing:2px;



}



.guide-item:hover{


transform:

translateY(-8px);



color:#e7c47a;



}





/*******************
VR按钮
*******************/


#vrBtn{


position:absolute;



right:30px;



bottom:120px;



z-index:25;



padding:

15px 28px;



border-radius:40px;



border:

1px solid rgba(255,255,255,.4);



background:

rgba(0,0,0,.45);



backdrop-filter:

blur(15px);



color:white;



font-size:16px;



cursor:pointer;



}




#vrBtn:hover{


background:

rgba(180,130,50,.8);



}



/*******************
Pannellum按钮美化
*******************/


.pnlm-hotspot{


background:

rgba(190,150,70,.9)!important;



}




</style>
</head>


<body>


<!-- 页面标题 -->

<div class="title">

善化寺 · 大雄宝殿

</div>



<!-- 全景容器 -->

<div id="panorama"></div>




<!-- 数字导游控制栏 -->


<div class="guide-bar">



<div class="guide-item"
onclick="showGuide('building')">

🏯

<span>
建筑
</span>


</div>



<div class="guide-item"
onclick="showGuide('buddha')">


🪷

<span>
佛像
</span>


</div>




<div class="guide-item"
onclick="showGuide('history')">


📜

<span>
历史
</span>


</div>




<div class="guide-item"
onclick="showGuide('ai')">


🎧

<span>
AI讲解
</span>


</div>




<div class="guide-item"
onclick="showGuide('map')">


🗺️

<span>
导览
</span>


</div>



</div>





<!-- VR按钮 -->


<button id="vrBtn">

🥽 VR沉浸模式

</button>





<!-- 信息窗口 -->


<div class="info-box"
id="infoBox">


<div class="close"
onclick="closeInfo()">

×

</div>



<h2 id="infoTitle">

</h2>



<p id="infoContent">

</p>


</div>







<script>



/*********************************
 Pannellum初始化
*********************************/


let viewer;



viewer =
pannellum.viewer(

"panorama",

{


default:{


firstScene:"outside",


autoLoad:true,


sceneFadeDuration:1200


},




scenes:{



/*********************************
 场景1：殿前广场
*********************************/


outside:{


type:"equirectangular",


panorama:

"images/exterior.jpg",



title:

"善化寺大雄宝殿前广场",



hfov:90,



hotSpots:[


{

pitch:-8,

yaw:0,


type:"scene",


text:

"进入大雄宝殿",



sceneId:

"inside"



}


]


},





/*********************************
 场景2：殿内
*********************************/


inside:{



type:"equirectangular",



panorama:

"images/hall.jpg",



title:

"大雄宝殿内部",



hfov:90,



hotSpots:[




/**************
中央佛像
**************/

{


pitch:0,


yaw:0,


type:"info",



text:

"释迦牟尼佛",




clickHandlerFunc:

function(){


showInfo("buddha");


}


},





/**************
左侧诸天
**************/


{


pitch:-5,


yaw:-55,


type:"info",


text:

"左侧二十四诸天",



clickHandlerFunc:

function(){


showInfo("guardians");


}



},






/**************
右侧诸天
**************/


{


pitch:-5,


yaw:55,


type:"info",


text:

"右侧二十四诸天",



clickHandlerFunc:

function(){


showInfo("guardians");


}



}



]


}




}



}

);








/*********************************
 文物介绍数据库
*********************************/


const infoData={



buddha:{


title:

"释迦牟尼佛",



content:

`

善化寺大雄宝殿中央供奉主尊佛像。


<br><br>


<strong>年代：</strong>

金代。


<br><br>


<strong>艺术特点：</strong>


佛像造型庄严，
比例匀称，
衣纹流畅。


<br><br>


体现了辽金时期
北方佛教造像艺术特色。


`


},




guardians:{


title:

"二十四诸天",



content:

`

大雄宝殿两侧供奉二十四诸天护法像。


<br><br>


这些造像融合佛教护法体系
与中国传统武将形象。


<br><br>


体现辽金时期彩塑艺术
高度成熟的审美特点。


`


}



};







/*********************************
 数字导游数据库
*********************************/


const guideData={



building:{


title:

"金代木构建筑",



content:

`

善化寺大雄宝殿是我国现存
规模最大的辽金时期佛殿之一。


<br><br>


建筑采用传统木构架体系，
斗拱层层叠加，
体现中国古代建筑智慧。


`

},





history:{


title:

"善化寺历史",



content:

`

善化寺始建于唐代开元年间。


<br><br>


现存主要建筑形成于辽金时期，
是中国北方佛教建筑的重要遗存。


`

},




ai:{


title:

"AI数字导游",



content:

`

您好，我是善化寺数字导游。


<br><br>


接下来将带您探索：

<br>

① 金代木构建筑

<br>

② 大雄宝殿彩塑

<br>

③ 二十四诸天艺术


<br><br>


🎧 语音讲解功能将在后续版本开启。

`

},




map:{


title:

"游览路线",



content:

`

当前数字游览路线：


<br><br>


① 殿前广场

<br>

↓

<br>

② 大雄宝殿

<br>

↓

<br>

③ 释迦牟尼佛

<br>

↓

<br>

④ 二十四诸天


`

},




buddha:{


title:

"释迦牟尼佛",


content:

`

点击热点即可查看佛像详细信息。

`

}



};








/*********************************
 打开文物介绍
*********************************/


function showInfo(type){


let data =
infoData[type];



document
.getElementById("infoTitle")
.innerHTML=

data.title;



document
.getElementById("infoContent")
.innerHTML=

data.content;



document
.getElementById("infoBox")
.style.display=

"block";



}







/*********************************
 打开导游介绍
*********************************/


function showGuide(type){


let data =
guideData[type];



document
.getElementById("infoTitle")
.innerHTML=

data.title;



document
.getElementById("infoContent")
.innerHTML=

data.content;



document
.getElementById("infoBox")
.style.display=

"block";


}








/*********************************
 关闭弹窗
*********************************/


function closeInfo(){


document
.getElementById("infoBox")
.style.display=

"none";


}








/*********************************
 手机陀螺仪
*********************************/


if(
window.DeviceOrientationEvent
){



window.addEventListener(

"deviceorientation",

function(e){


if(e.alpha){


viewer.setYaw(

e.alpha

);


}



}


);


}








/*********************************
 VR模式
*********************************/


document
.getElementById("vrBtn")
.onclick=function(){



if(
navigator.xr

){



navigator.xr.requestSession(

"immersive-vr"

)

.then(

function(){


alert(

"VR模式启动成功"

);


}

);



}

else{


alert(

"当前浏览器不支持WebXR，请使用VR设备或手机浏览器"

);


}



};





</script>



</body>


</html>
