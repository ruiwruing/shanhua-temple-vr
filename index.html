<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Shanhua Temple VR — Quick Viewer</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css" />
  <style>html,body,#panorama{height:100%;margin:0;background:#000}#panorama{width:100vw;height:100vh}</style>
</head>
<body>
  <div id="panorama"></div>
  <script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
  <script>
    // Minimal Pannellum viewer that uses the uploaded image files in this repo.
    // Make sure the filename matches exactly (case-sensitive) with the file in repo root.
    const IMAGE = "diannei.JPG"; // change to dianqian.jpg / dianqian.png if you prefer

    pannellum.viewer('panorama', {
      type: 'equirectangular',
      panorama: IMAGE,
      autoLoad: true,
      showFullscreenCtrl: true,
      showZoomCtrl: true
    });
  </script>
</body>
</html>
