<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Shanhua Temple VR — Viewer</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css" />
  <style>
    html,body,#panorama{height:100%;margin:0;background:#000}
    #panorama{width:100vw;height:100vh}

    /* Controls hint */
    .controls-hint{
      position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
      background:rgba(0,0,0,0.45);color:#fff;padding:8px 14px;border-radius:20px;
      font-size:13px;z-index:3500;backdrop-filter:blur(6px);pointer-events:none
    }

    /* Scene navigation (floating) */
    .scene-nav{
      position:fixed;right:30px;top:50%;transform:translateY(-50%);
      z-index:4000;display:flex;flex-direction:column;gap:12px;pointer-events:auto
    }
    .scene-btn{
      background:rgba(255,255,255,0.08);backdrop-filter:blur(8px);
      border:1px solid rgba(255,255,255,0.12);color:rgba(255,255,255,0.9);
      padding:12px 16px;border-radius:12px;cursor:pointer;font-size:14px;min-width:120px;
      text-align:left;transition:all .18s
    }
    .scene-btn:hover{transform:translateX(-6px);background:rgba(255,255,255,0.12)}
    .scene-btn.active{background:rgba(201,168,76,0.22);border-color:rgba(201,168,76,0.36);color:#fff}

    /* Make buttons touch-friendly */
    @media (max-width:640px){
      .scene-nav{right:12px;left:50%;top:auto;bottom:16px;transform:translateX(-50%);flex-direction:row;gap:10px;padding:6px;border-radius:14px;background:rgba(0,0,0,0.18);border:1px solid rgba(25,25,25,0.12)}
      .scene-btn{min-width:48px;padding:10px 12px;border-radius:10px;font-size:13px}
      .controls-hint{bottom:76px}
    }
  </style>
</head>
<body>
  <div id="panorama"></div>

  <div class="controls-hint" id="controlsHint">🖱️ 拖拽旋转查看360°全景 · 点击按钮切换场景</div>

  <div class="scene-nav" id="sceneNav">
    <button class="scene-btn active" id="btnExterior" onclick="switchScene('exterior')">殿前广场</button>
    <button class="scene-btn" id="btnInterior" onclick="switchScene('interior')">殿内全景</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
  <script>
    // Scene image filenames (use absolute github.io URLs for reliable testing)
    const IMAGE_EXTERIOR = "https://ruiwruing.github.io/shanhua-temple-vr/diannei.JPG"; // exterior panorama
    const IMAGE_INTERIOR = "https://ruiwruing.github.io/shanhua-temple-vr/dianqian.jpg"; // interior panorama (备用: dianqian.png)

    // Viewer configuration with two scenes
    const viewerConfig = {
      "default": {
        author: "",
        sceneFadeDuration: 1000,
        autoLoad: true,
        firstScene: "exterior" // ensure initial scene is specified
      },
      "scenes": {
        "exterior": {
          "title": "殿前广场",
          "type": "equirectangular",
          "panorama": IMAGE_EXTERIOR,
          "hfov": 90
        },
        "interior": {
          "title": "殿内全景",
          "type": "equirectangular",
          "panorama": IMAGE_INTERIOR,
          "hfov": 90
        }
      }
    };

    // Create viewer
    const viewer = pannellum.viewer('panorama', viewerConfig);

    // Expose viewer to window for Console-based testing (方案 B)
    window._pannellumViewer = viewer; // 在 Console 中可以通过 window._pannellumViewer 使用 setPanorama/loadScene

    // If viewer couldn't find panorama, show console info to help debug
    try{
      // Check if the current scene has a panorama, otherwise log scenes
      const cfg = viewer.getConfig ? viewer.getConfig() : viewerConfig;
      const currentScene = cfg && cfg.default && cfg.default.firstScene ? cfg.default.firstScene : null;
      const panoramaSpecified = currentScene && cfg.scenes && cfg.scenes[currentScene] && cfg.scenes[currentScene].panorama;
      if(!panoramaSpecified){
        console.warn('Panorama not specified for firstScene. Available scenes:', Object.keys(cfg.scenes || {}));
      } else {
        console.log('Initial panorama configured for scene', currentScene, ':', cfg.scenes[currentScene].panorama);
      }
    }catch(e){ console.warn('Viewer config check error', e); }

    // Adjust HFOV for mobile for a wider field of view
    function adjustHfov(){
      try{
        const mobile = window.innerWidth <= 640;
        const hfov = mobile ? 100 : 90;
        if(viewer && typeof viewer.setHfov === 'function'){
          viewer.setHfov(hfov);
        }
      }catch(e){console.warn('adjustHfov error', e)}
    }
    window.addEventListener('resize', adjustHfov);
    // apply initial HFOV after a short delay to ensure viewer ready
    setTimeout(adjustHfov, 300);

    // Scene switch helper
    function switchScene(id){
      if(!viewer) return;
      try{
        viewer.loadScene(id);
      }catch(e){
        // fallback: try loading panorama directly
        console.warn('loadScene failed', e);
        // attempt to load panorama URL if scene load fails
        var scene = viewerConfig.scenes && viewerConfig.scenes[id];
        if(scene && scene.panorama){
          try{ viewer.setPanorama(scene.panorama); }catch(err){ console.warn('setPanorama failed', err); }
        }
      }
      // update active button
      document.querySelectorAll('.scene-btn').forEach(b=>b.classList.remove('active'));
      const btn = document.getElementById(id === 'interior' ? 'btnInterior' : 'btnExterior');
      if(btn) btn.classList.add('active');
      // small visual transition hint
      const hint = document.getElementById('controlsHint');
      if(hint){ hint.textContent = id === 'interior' ? '正在查看：殿内全景' : '正在查看：殿前广场'; setTimeout(()=>hint.textContent='🖱️ 拖拽旋转查看360°全景 · 点击按钮切换场景',1200); }
    }

    // Ensure scene buttons are above viewer and pointer-events work
    document.getElementById('sceneNav').style.pointerEvents = 'auto';

    /*
      方案 B — 在 Console 临时测试（无需改源码即可快速验证）：
      在 DevTools Console 中粘贴并执行下面任一命令：

      // 使用 github.io 的绝对 URL 创建临时 viewer（推荐，同源）：
      window.testViewer = pannellum.viewer('panorama', {
        default: { firstScene: 'exterior', autoLoad: true },
        scenes: {
          exterior: { title: '外景', type: 'equirectangular', panorama: 'https://ruiwruing.github.io/shanhua-temple-vr/diannei.JPG', hfov: 90 },
          interior: { title: '内景', type: 'equirectangular', panorama: 'https://ruiwruing.github.io/shanhua-temple-vr/dianqian.jpg', hfov: 90 }
        }
      });

      // 如果想动态替换当前已创建 viewer 的 panorama：
      try { window._pannellumViewer = window._pannellumViewer || window.testViewer; window._pannellumViewer.setPanorama('https://ruiwruing.github.io/shanhua-temple-vr/diannei.JPG'); } catch(e){ console.error(e); }

      // 备用：raw.githubusercontent 的 URL（跨域可能更容易触发 CORS 问题，仅作对比）
      // https://raw.githubusercontent.com/ruiwruing/shanhua-temple-vr/main/diannei.JPG
    */
  </script>
</body>
</html>
