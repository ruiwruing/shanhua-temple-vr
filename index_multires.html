<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>善化寺·大雄宝殿数字沉浸体验</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum/build/pannellum.css">
<script src="https://cdn.jsdelivr.net/npm/pannellum/build/pannellum.js"></script>
<style>
html,body,#panorama{margin:0;width:100%;height:100%;overflow:hidden;font-family:"Microsoft YaHei",sans-serif}
.title{position:absolute;top:28px;left:50%;transform:translateX(-50%);z-index:20;color:#fff;font-size:28px;letter-spacing:8px;text-shadow:0 2px 8px #000}
.guide-bar{position:absolute;bottom:25px;left:50%;transform:translateX(-50%);display:flex;gap:18px;padding:12px 28px;background:rgba(0,0,0,.45);backdrop-filter:blur(12px);border-radius:40px;z-index:20}
.guide-item{cursor:pointer;color:#fff;text-align:center;font-size:24px}
.guide-item span{display:block;font-size:13px;margin-top:4px}
.info-box{display:none;position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:420px;max-width:90%;background:rgba(20,20,20,.65);color:#fff;padding:30px;border-radius:18px;z-index:30}
.close{position:absolute;right:18px;top:10px;font-size:24px;cursor:pointer}
</style>
</head>
<body>
<div class="title">善化寺 · 大雄宝殿</div>
<div id="panorama"></div>

<div class="guide-bar">
<div class="guide-item" onclick="showGuide('building')">🏯<span>建筑</span></div>
<div class="guide-item" onclick="showGuide('buddha')">🪷<span>佛像</span></div>
<div class="guide-item" onclick="showGuide('history')">📜<span>历史</span></div>
<div class="guide-item" onclick="showGuide('ai')">🎧<span>AI讲解</span></div>
<div class="guide-item" onclick="showGuide('map')">🗺️<span>导览</span></div>
</div>

<div class="info-box" id="infoBox">
<div class="close" onclick="closeInfo()">×</div>
<h2 id="infoTitle"></h2>
<div id="infoContent"></div>
</div>

<script>
const viewer=pannellum.viewer("panorama",{
default:{firstScene:"outside",autoLoad:true,sceneFadeDuration:1200,showControls:true},
scenes:{
outside:{
type:"multires",
multiRes:{
basePath:"images/exterior_tiles",
path:"/%l/%s%y_%x",
fallbackPath:"/fallback/%s",
extension:"jpg",
tileResolution:512,
maxLevel:2,
cubeResolution:560
},
title:"善化寺大雄宝殿前广场",
hotSpots:[{pitch:-8,yaw:0,type:"scene",text:"进入大雄宝殿",sceneId:"inside"}]
},
inside:{
type:"multires",
multiRes:{
basePath:"images/hall_tiles",
path:"/%l/%s%y_%x",
fallbackPath:"/fallback/%s",
extension:"jpg",
tileResolution:512,
maxLevel:2,
cubeResolution:560
},
title:"大雄宝殿内部",
hotSpots:[
{pitch:0,yaw:0,type:"info",text:"释迦牟尼佛",clickHandlerFunc:()=>showInfo("buddha")},
{pitch:-5,yaw:-55,type:"info",text:"左侧二十四诸天",clickHandlerFunc:()=>showInfo("guardians")},
{pitch:-5,yaw:55,type:"info",text:"右侧二十四诸天",clickHandlerFunc:()=>showInfo("guardians")}
]
}
}
});

const infoData={
buddha:{title:"释迦牟尼佛",content:"善化寺大雄宝殿中央供奉主尊佛像。<br><br><b>年代：</b>金代。<br><br>体现辽金时期北方佛教造像艺术特色。"},
guardians:{title:"二十四诸天",content:"两侧供奉二十四诸天护法像，融合佛教护法体系与中国传统武将形象。"}
};
const guideData={
building:{title:"金代木构建筑",content:"善化寺大雄宝殿是现存规模最大的辽金时期佛殿之一。"},
history:{title:"善化寺历史",content:"始建于唐代，现存主体建筑形成于辽金时期。"},
ai:{title:"AI数字导游",content:"欢迎体验数字导览，后续可接入语音讲解。"},
map:{title:"游览路线",content:"殿前广场 → 大雄宝殿 → 佛像 → 二十四诸天"},
buddha:{title:"释迦牟尼佛",content:"点击热点查看更多介绍。"}
};
function showInfo(k){infoTitle.innerHTML=infoData[k].title;infoContent.innerHTML=infoData[k].content;infoBox.style.display="block";}
function showGuide(k){infoTitle.innerHTML=guideData[k].title;infoContent.innerHTML=guideData[k].content;infoBox.style.display="block";}
function closeInfo(){infoBox.style.display="none";}
</script>
</body>
</html>
